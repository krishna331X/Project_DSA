<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nail Studio Booking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>💅 Nail Studio Booking System</h1>
<p>DSA Based Booking Management</p>
</header>

<section class="services">

<h2>Our Services</h2>

<div class="service-card">
<h3>Gel Nails</h3>
<p>Long lasting shiny nails</p>
<button onclick="bookService('Gel Nails')">Book</button>
</div>

<div class="service-card">
<h3>Acrylic Nails</h3>
<p>Stylish nail extensions</p>
<button onclick="bookService('Acrylic Nails')">Book</button>
</div>

<div class="service-card">
<h3>Nail Art</h3>
<p>Creative nail designs</p>
<button onclick="bookService('Nail Art')">Book</button>
</div>

<div class="service-card">
<h3>Manicure</h3>
<p>Professional nail care</p>
<button onclick="bookService('Manicure')">Book</button>
</div>

</section>

<section class="booking">

<h2>Booking Queue</h2>

<ul id="queueList"></ul>

<button onclick="serveCustomer()">Serve Next Customer</button>

</section>

<section class="history">

<h2>Service History (Stack)</h2>

<ul id="historyList"></ul>

<button onclick="undoService()">Undo Last Service</button>

</section>

<script src="script.js"></script>

</body>
</html>
