<!DOCTYPE html>
<html>

<head>
<title>View Bookings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;margin-top:30px;">All Bookings</h2>

<div class="controls">

<input type="text" id="search" placeholder="Search name">

<button onclick="searchBooking()">Search</button>

<button onclick="sortBookings()">Sort by Time</button>

<button onclick="cancelLast()">Cancel Last</button>

</div>

<table>

<thead>

<tr>
<th>Name</th>
<th>Service</th>
<select id="service">

<option>Basic Manicure</option>
<option>Gel Manicure</option>
<option>Nail Art Design</option>
<option>Acrylic Extensions</option>
<option>Pedicure Spa</option>
<option>French Tips</option>

</select>
<th>Time</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
